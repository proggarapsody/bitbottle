version: 2

project_name: bitbottle

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: bitbottle
    main: ./cmd/bitbottle
    binary: bitbottle
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildDate={{.Date}}
      - -X main.commit={{.Commit}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: proggarapsody
    name: bitbottle
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Tag}}"
  footer: |
    ## Installation

    ```bash
    go install github.com/proggarapsody/bitbottle/cmd/bitbottle@{{.Tag}}
    ```

    Or download the binary for your platform from the assets above.
